name: Bug report
description: Report reproducible behavior that differs from the documentation.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private media, complete real task IDs, or temporary result URLs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide minimal, redacted steps and configuration.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: v22.x
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, private media, complete real task IDs, and temporary result URLs.
          required: true
